<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>ECHO RT - Alert Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --cyan: #00f2ff; --green: #22c55e; --red: #ef4444; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; margin-top: 20px; }
        .card { background: var(--card); border: 1px solid #1e293b; padding: 30px; border-radius: 20px; text-align: center; transition: 0.3s; }
        .full { grid-column: 1 / span 2; }
        
        /* Stiluri Buton */
        #btn-status { font-size: 2rem; font-weight: 900; letter-spacing: 2px; }
        .btn-inactiv { color: #334155; }
        .btn-activ { color: var(--red); text-shadow: 0 0 20px rgba(239, 68, 68, 0.6); animation: alert-pulse 0.5s infinite; }
        
        /* Stiluri Distanta */
        .dist-val { font-size: 3.5rem; font-weight: bold; display: block; margin: 10px 0; }
        .st-sigur { color: var(--green); }
        .st-pericol { color: var(--red); animation: alert-pulse 1s infinite; }

        @keyframes alert-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .label { color: #64748b; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h1 style="color: var(--cyan); letter-spacing: 10px; margin-bottom: 5px;">ECHO <span style="color:white">RT</span></h1>
    <p style="color: #64748b; margin-top: 0;">Sistem de Monitorizare Radar și Alertă</p>

    <div class="dashboard">
        <div class="card full">
            <span class="label">Status Senzor Distanță</span>
            <div id="radar-ui">
                <span id="dist-display" class="dist-val">-- cm</span>
                <span id="status-label" style="font-weight: bold;">STANDBY</span>
            </div>
        </div>

        <div class="card full" id="btn-card">
            <span class="label">Stare Buton Panică</span>
            <div id="btn-status" class="btn-inactiv" style="margin-top: 15px;">INACTIV</div>
        </div>
    </div>

    <script>
        // --- DATE DE INLOCUIT (Firebase Config) ---
        const firebaseConfig = {
            databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        // -------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('sistem').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // 1. Logica Buton (Activ/Inactiv)
            const btnEl = document.getElementById('btn-status');
            const btnCard = document.getElementById('btn-card');
            
            if (data.buton_stare === 1) {
                btnEl.innerText = "ACTIV - ALERTĂ!";
                btnEl.className = "btn-activ";
                btnCard.style.borderColor = "var(--red)";
            } else {
                btnEl.innerText = "INACTIV";
                btnEl.className = "btn-inactiv";
                btnCard.style.borderColor = "#1e293b";
            }

            // 2. Logica Radar (Watchdog + Distanta)
            const acum = Date.now();
            const diff = (acum - data.radar_timestamp) / 1000;
            const distDisplay = document.getElementById('dist-display');
            const statusLabel = document.getElementById('status-label');

            if (diff < 40) { // Radarul este online
                const d = data.distanta;
                distDisplay.innerText = d + " cm";
                if (d <= 15) {
                    statusLabel.innerText = "PERICOL";
                    statusLabel.className = "st-pericol";
                    distDisplay.className = "dist-val st-pericol";
                } else {
                    statusLabel.innerText = "SIGURANȚĂ";
                    statusLabel.className = "st-sigur";
                    distDisplay.className = "dist-val st-sigur";
                }
            } else { // Radarul este offline
                distDisplay.innerText = "-- cm";
                statusLabel.innerText = "SISTEM DECONECTAT";
                statusLabel.className = "";
                distDisplay.className = "dist-val";
            }
        });
    </script>
</body>
</html>
