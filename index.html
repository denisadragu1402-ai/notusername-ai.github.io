<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-dark: #0d0612; --card-bg: #1a0f26;
            --neon-purple: #b050ff; --neon-pink: #ff00ff; 
            --text-gray: #8e6b9c; --text-light: #d0a0ff;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); 
            color: var(--text-light); margin: 0; display: flex;
            flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        .dashboard {
            background: var(--card-bg); padding: 35px; border-radius: 25px;
            border: 1px solid var(--neon-purple); text-align: center; width: 350px;
            box-shadow: 0 0 20px rgba(176, 80, 255, 0.2);
        }
        .value { font-size: 3.5em; font-weight: 900; color: var(--neon-purple); margin: 15px 0; }
        .btn-ham {
            background: transparent; border: 2px solid var(--neon-pink); color: var(--neon-pink);
            padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; transition: 0.3s; margin: 20px 0;
        }
        .btn-ham:hover { background: var(--neon-pink); color: white; box-shadow: 0 0 15px var(--neon-pink); }
        .footer-tech {
            position: fixed; bottom: 20px; font-size: 0.7em; color: var(--text-gray);
            display: flex; gap: 15px; text-transform: uppercase;
        }
        .active-btn { color: var(--neon-pink) !important; animation: pulse 0.5s infinite; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <h1>ECHO SYSTEM</h1>
    <div class="dashboard">
        <div style="font-size: 0.7em; color: var(--text-gray);">DISTANȚĂ</div>
        <div id="dist-val" class="value">-- cm</div>
        
        <button class="btn-ham" onclick="triggerHam()">Comandă: HAM HAM</button>

        <div style="border-top: 1px solid #3d2354; padding-top: 15px;">
            <div style="font-size: 0.7em; color: var(--text-gray);">STATUS BUTON FIZIC (PIN 2)</div>
            <div id="btn-status">INACTIV</div>
        </div>
    </div>

    <div class="footer-tech">
        <span id="net-status">Offline</span> | <span id="live-clock">00:00:00</span> | <span>v1.3</span>
    </div>

    <script>
        // CONFIGURARE (Asigură-te că URL-ul e exact acesta)
        const firebaseConfig = { databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ceas Live
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ro-RO'); }, 1000);

        // 1. ASCULTĂM DISTANȚA (Path: sistem/distanta)
        db.ref('sistem/distanta').on('value', (s) => { 
            const d = s.val();
            const el = document.getElementById('dist-val');
            el.innerText = d ? d + " cm" : "-- cm";
            // Se face roz dacă obiectul e sub 15cm
            el.style.color = d < 15 ? "var(--neon-pink)" : "var(--neon-purple)";
        });

        // 2. ASCULTĂM BUTONUL FIZIC (Path: trigger_buton)
        // Folosim 'value' pentru a vedea când se schimbă numărul în Firebase
        let lastValue = null;
        db.ref('trigger_buton').on('value', (s) => {
            const val = s.val();
            const el = document.getElementById('btn-status');
            
            if (lastValue !== null && val !== lastValue) {
                el.innerText = "APĂSAT!";
                el.className = "active-btn";
                // Revine la normal după 1 secundă
                setTimeout(() => {
                    el.innerText = "INACTIV";
                    el.className = "";
                }, 1000);
            }
            lastValue = val;
        });

        // 3. TRIMITEM COMANDA HAM (Path: Comanda_ham)
        function triggerHam() {
            console.log("Comandă trimisă...");
            db.ref('Comanda_ham').set(1);
            // Nu mai dăm set(0) aici, lăsăm placa Arduino să reseteze la 0 după ce aprinde LED-ul
        }

        // Status Conexiune
        db.ref('.info/connected').on('value', (s) => {
            document.getElementById('net-status').innerText = s.val() ? "Online" : "Offline";
            document.getElementById('net-status').style.color = s.val() ? "var(--neon-purple)" : "red";
        });
    </script>
</body>
</html>
