<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard - Prototip Live</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --container-bg: #112240;
            --accent-color: #64ffda;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
            --alert-color: #f44336;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }

        .container { 
            background: var(--container-bg); 
            padding: 2rem; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border-top: 5px solid var(--accent-color); 
            width: 350px; 
            text-align: center;
        }

        h1 { color: var(--accent-color); font-size: 1.8rem; margin-bottom: 0.2rem; }
        .subtitle { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 2rem; display: block; }

        .stat-box {
            background: rgba(2, 12, 27, 0.4);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            border: 1px solid #233554;
        }

        .label { display: block; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 1px; }
        .value { font-family: 'Courier New', monospace; font-size: 2.2rem; font-weight: bold; }

        .status-ok { color: var(--accent-color); }
        .status-alert { color: var(--alert-color); animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .btn-connect {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
            transition: 0.3s;
        }

        .btn-connect:hover { background: rgba(100, 255, 218, 0.1); }
        
        #connection-log { font-size: 0.7rem; color: #8892b0; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>ECHO SYSTEM</h1>
    <span class="subtitle">INTERFAȚĂ ASISTENT AVANSAT V1.0</span>

    <div class="stat-box">
        <span class="label">Distanță Obstacol</span>
        <span id="distanta" class="value">-- cm</span>
    </div>

    <div class="stat-box">
        <span class="label">Stare Alertă</span>
        <span id="alerta" class="value status-ok">NOMINAL</span>
    </div>

    <button class="btn-connect" onclick="connectSerial()">CONECTEAZĂ ROBOT</button>
    <p id="connection-log">Așteptare conexiune USB...</p>
</div>

<script>
    async function connectSerial() {
        const log = document.getElementById('connection-log');
        try {
            // Pas 1: Solicitare acces Port Serial
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 }); // VITEZA TREBUIE SĂ FIE 9600 ca în Arduino

            log.innerText = "Conectat la Arduino Mega!";
            log.style.color = "#64ffda";

            // Pas 2: Citire flux de date
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            const reader = textDecoder.readable.getReader();

            while (true) {
                const { value, done } = await reader.read();
                if (done) {
                    reader.releaseLock();
                    break;
                }
                if (value) {
                    processData(value.trim());
                }
            }
        } catch (error) {
            log.innerText = "Eroare: " + error.message;
            log.style.color = "#f44336";
        }
    }

    function processData(data) {
        const distance = parseInt(data);
        if (isNaN(distance)) return;

        // Actualizare interfață
        document.getElementById('distanta').innerText = distance + " cm";
        
        const alertaEl = document.getElementById('alerta');
        if (distance < 50 && distance > 0) {
            alertaEl.innerText = "PERICOL";
            alertaEl.className = "value status-alert";
        } else {
            alertaEl.innerText = "NOMINAL";
            alertaEl.className = "value status-ok";
        }
    }
</script>

</body>
</html>
