<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>ECHO REAL-TIME COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --bg: #030712; --cyan: #00f2ff; --red: #ff3131; --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; }
        .card { background: var(--card); border: 1px solid #1e293b; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .value { font-size: 3.5rem; font-weight: 800; display: block; margin: 10px 0; color: var(--cyan); }
        .status-alert { color: var(--red); text-shadow: 0 0 15px var(--red); }
        .log-container { grid-column: 1 / -1; text-align: left; background: #000; padding: 15px; border-radius: 10px; border-left: 4px solid var(--cyan); }
        .log-entry { font-family: monospace; font-size: 0.9rem; padding: 5px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .badge { background: var(--cyan); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 5px; color: var(--cyan)">ECHO <span style="color:white">REAL-TIME<3</span></h1>

    <div class="dashboard">
        <div class="card">
            <span style="color: #64748b">DISTANȚĂ LIVE</span>
            <span id="dist-val" class="value">-- cm</span>
        </div>
        <div class="card">
            <span style="color: #64748b">STATUS SISTEM</span>
            <span id="status-val" class="value" style="font-size: 2rem">CONNECTING...</span>
        </div>

        <div class="card log-container">
            <div style="margin-bottom: 15px; color: var(--cyan)">JURNAL EVENIMENTE (LIVE)</div>
            <div id="journal"></div>
        </div>
    </div>

    <script>
        // CONFIGURARE FIREBASE (Inlocuieste cu datele tale!)
        const firebaseConfig = {
            databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ASCULTĂM LIVE DATELE
        db.ref('sistem').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // 1. Update Distanta
            document.getElementById('dist-val').innerText = data.distanta + " cm";

            // 2. Update Status
            const st = document.getElementById('status-val');
            if(data.buton === 1) {
                st.innerText = "ACTIVAT";
                st.className = "value"; st.style.color = "#facc15";
            } else if(data.distanta <= 10 && data.distanta > 0) {
                st.innerText = "PERICOL";
                st.className = "value status-alert";
            } else {
                st.innerText = "NOMINAL";
                st.className = "value"; st.style.color = "#00f2ff";
            }
        });

        // JURNAL LIVE (Ultimele 10 apasari de buton)
        db.ref('jurnal').limitToLast(10).on('child_added', (snapshot) => {
            const entry = snapshot.val();
            const logDiv = document.getElementById('journal');
            const html = `
                <div class="log-entry">
                    <span><span class="badge">BUTON</span> ${entry.data}</span>
                    <span style="color: var(--cyan)">${entry.ora}</span>
                </div>`;
            logDiv.innerHTML = html + logDiv.innerHTML;
        });
    </script>
</body>
</html>
