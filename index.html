<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard v5.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0d0612; --purp: #b050ff; --pink: #ff00ff; --txt: #d0a0ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .dashboard { background: #1a0f26; padding: 30px; border-radius: 25px; border: 2px solid var(--purp); text-align: center; width: 340px; box-shadow: 0 0 20px rgba(176,80,255,0.3); }
        .value { font-size: 4em; font-weight: bold; color: var(--purp); margin: 10px 0; }
        
        /* BUTONUL RESTAURAT */
        .btn-ham {
            background: transparent; border: 2px solid var(--pink); color: var(--pink);
            padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; width: 100%; margin: 20px 0; transition: 0.3s;
        }
        .btn-ham:hover { background: var(--pink); color: white; box-shadow: 0 0 15px var(--pink); }
        
        .status-box { border-top: 1px solid #331a4d; padding-top: 15px; font-weight: bold; }
        .active { color: var(--pink); text-shadow: 0 0 10px var(--pink); }
    </style>
</head>
<body>
    <h1>ECHO SYSTEM</h1>
    <div class="dashboard">
        <div style="font-size: 0.8em; color: #8e6b9c;">DISTANȚĂ</div>
        <div id="dist-val" class="value">-- cm</div>
        <div id="dist-msg" style="margin-bottom: 10px;">CONECTARE...</div>

        <button class="btn-ham" onclick="triggerHam()">Comandă: Ham Ham (LED)</button>

        <div class="status-box">
            <div style="font-size: 0.7em; color: #8e6b9c; margin-bottom: 5px;">BUTON ROBOT</div>
            <div id="btn-status">INACTIV</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Citire Distanta
        db.ref('sistem/distanta').on('value', (s) => {
            const d = s.val();
            const el = document.getElementById('dist-val');
            const msg = document.getElementById('dist-msg');
            if (d === null || d === 999) {
                el.innerText = "-- cm"; msg.innerText = "ZONĂ LIBERĂ"; el.style.color = "var(--purp)";
            } else {
                el.innerText = d + " cm";
                if(d <= 15) { msg.innerText = "PERICOL!"; el.style.color = "var(--pink)"; }
                else { msg.innerText = "OBSTACOL"; el.style.color = "var(--purp)"; }
            }
        });

        // Comanda LED (Ham Ham)
        function triggerHam() {
            db.ref('comanda_ham').set(1).then(() => alert("Comandă trimisă!"));
        }

        // Status Buton Robot
        let lastB = null;
        db.ref('trigger_buton').on('value', (s) => {
            const v = s.val();
            const el = document.getElementById('btn-status');
            if (lastB !== null && v != lastB) {
                el.innerText = "APĂSAT!"; el.className = "active";
                setTimeout(() => { el.innerText = "INACTIV"; el.className = ""; }, 5000);
            }
            lastB = v;
        });
    </script>
</body>
</html>
