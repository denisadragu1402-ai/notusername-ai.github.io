<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; }
        .container { margin-top: 50px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; display: inline-block; min-width: 250px; margin: 10px; border: 1px solid #333; }
        .live-clock { color: #00ff88; font-size: 1.5em; font-weight: bold; }
        .last-press { color: #ff3e3e; font-size: 1.2em; }
        .distanta { font-size: 3em; color: #00d4ff; }
        .status { padding: 10px; border-radius: 5px; margin-top: 10px; display: inline-block; }
        .active { background: #ff3e3e; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>PROIECT ECHO</h1>

        <div class="card">
            <p>ORA LIVE</p>
            <div id="clock" class="live-clock">00:00:00</div>
        </div>

        <div class="card">
            <p>DISTANȚĂ SENZOR</p>
            <div id="dist" class="distanta">0</div>
            <p>cm</p>
        </div>

        <div class="card">
            <p>ULTIMA ACTIVARE BUTON</p>
            <div id="lastTime" class="last-press">--:--:--</div>
            <div id="btnStatus" class="status">AȘTEPTARE...</div>
        </div>
    </div>

    <script>
        // CONFIGURARE FIREBASE (Pune datele tale aici!)
        const firebaseConfig = {
            databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. FUNCȚIE ORA LIVE
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ro-RO');
            document.getElementById('clock').innerText = timeString;
        }
        setInterval(updateClock, 1000); // Update la fiecare secundă

        // 2. ASCULTARE DATE DIN FIREBASE
        
        // Ascultăm distanța
        db.ref('sistem').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('dist').innerText = data.distanta;
            }
        });

        // Ascultăm trigger-ul de buton
        db.ref('trigger_buton').on('value', (snapshot) => {
            const val = snapshot.val();
            if(val) {
                // Când valoarea se schimbă, înseamnă că butonul a fost apăsat
                const now = new Date();
                const oraApasare = now.toLocaleTimeString('ro-RO');
                
                document.getElementById('lastTime').innerText = oraApasare;
                
                // Efect vizual de alertă
                const statusDiv = document.getElementById('btnStatus');
                statusDiv.innerText = "BUTON APĂSAT!";
                statusDiv.className = "status active";
                
                setTimeout(() => {
                    statusDiv.className = "status";
                    statusDiv.innerText = "OK";
                }, 3000); // Revine la normal după 3 secunde
            }
        });
    </script>
</body>
</html>
