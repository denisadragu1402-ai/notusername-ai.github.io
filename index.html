<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard - Prototip Hackathon</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --container-bg: #112240;
            --accent-color: #64ffda;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
            --alert-color: #f44336;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .container { 
            background: var(--container-bg); 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            border-top: 4px solid var(--accent-color); 
            width: 90%;
            max-width: 400px; 
            text-align: center;
        }

        h1 { 
            color: var(--accent-color); 
            font-size: 1.8rem; 
            margin-bottom: 0.5rem; 
            letter-spacing: 2px;
        }

        .version {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
            display: block;
        }

        .stat-card {
            background: rgba(2, 12, 27, 0.5);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid #233554;
            transition: all 0.3s ease;
        }

        .label { 
            display: block;
            font-weight: bold; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            margin-bottom: 0.5rem;
        }

        .value { 
            font-family: 'Share Tech Mono', 'Courier New', monospace; 
            font-size: 2rem; 
            color: var(--text-main); 
        }

        .status-ok { color: var(--accent-color); }
        
        .status-alert { 
            color: var(--alert-color); 
            text-shadow: 0 0 10px var(--alert-color);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .btn-connect {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1.5rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-connect:hover {
            background: rgba(100, 255, 218, 0.1);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.3);
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ECHO SYSTEM</h1>
    <span class="version">ADVANCED ASSISTANT V1.0 | LIVE STREAM</span>
    
    <div class="stat-card">
        <span class="label">Distanță Obstacol</span>
        <span id="distanta" class="value">-- cm</span>
    </div>

    <div class="stat-card">
        <span class="label">Stare Sistem</span>
        <span id="alerta" class="value status-ok">NOMINAL</span>
    </div>

    <div class="stat-card">
        <span class="label">Comunicare Cloud</span>
        <span id="vocal" class="value" style="font-size: 1rem;">DECONECTAT</span>
    </div>

    <button class="btn-connect" onclick="conecteazaArduino()">Conectează Robot</button>

    <div class="footer-note">
        GitHub Pages Secured Connection via WebSerial API
    </div>
</div>

<script>
    async function conecteazaArduino() {
        try {
            // Pas 1: Cere permisiunea pentru portul Serial
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            
            document.getElementById('vocal').innerText = "ONLINE";
            document.getElementById('vocal').className = "value status-ok";

            // Pas 2: Citește fluxul de date
            const decoder = new TextDecoderStream();
            const inputClosed = port.readable.pipeTo(decoder.writable);
            const inputStream = decoder.readable;
            const reader = inputStream.getReader();

            while (true) {
                const { value, done } = await reader.read();
                if (done) {
                    reader.releaseLock();
                    break;
                }
                if (value) {
                    updateInterface(value.trim());
                }
            }
        } catch (error) {
            console.error("Eroare la conectare:", error);
            alert("Eroare: Asigură-te că folosești Chrome și că Arduino este conectat!");
        }
    }

    function updateInterface(val) {
        const dist = parseInt(val);
        if (isNaN(dist)) return;

        // Actualizează cifra distanței
        document.getElementById('distanta').innerText = dist + " cm";

        // Logică Alertă vizuală
        const alertaEl = document.getElementById('alerta');
        if (dist < 50 && dist > 0) {
            alertaEl.innerText = "CRITIC: OBSTACOL";
            alertaEl.className = "value status-alert";
        } else {
            alertaEl.innerText = "NOMINAL";
            alertaEl.className = "value status-ok";
        }
    }
</script>

</body>
</html>
