
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #0f0f0f; 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Ora live - discretă, în colț */
        #live-clock {
            position: fixed;
            top: 15px;
            right: 20px;
            font-size: 0.9em;
            color: #555; /* Gri închis, să nu bată la ochi */
            font-weight: normal;
        }

        h1 { margin-bottom: 30px; letter-spacing: 2px; color: #eee; }

        .dashboard {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 320px;
        }

        .label { font-size: 0.8em; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        
        /* Valori dinamice */
        .value { font-size: 3.5em; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .status-text { font-size: 1.5em; font-weight: bold; margin-top: 10px; }

        /* Culori mesaje */
        .safe { color: #2ecc71; }    /* Verde */
        .danger { color: #e74c3c; }  /* Roșu */
        .neutral { color: #3498db; } /* Albastru */

        .last-press {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="live-clock">00:00:00</div>

    <h1>ECHO SYSTEM</h1>

    <div class="dashboard">
        <div class="label">Distanță curentă</div>
        <div id="dist-val" class="value neutral">0</div>
        
        <div class="label">Status Sistem</div>
        <div id="status-msg" class="status-text safe">SISTEM OK</div>

        <div class="last-press">
            Ultima apăsare buton:<br>
            <span id="last-time" style="color: #eee;">--:--:--</span>
        </div>
    </div>

    <script>
        // CONFIGURARE FIREBASE
        const firebaseConfig = {
            databaseURL: "https://echo-bd4aa-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Ora Live (Discretă)
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('ro-RO');
        }
        setInterval(updateClock, 1000);

        // 2. Ascultare Date Firebase
        const distElement = document.getElementById('dist-val');
        const statusElement = document.getElementById('status-msg');
        const lastTimeElement = document.getElementById('last-time');

        // Monitorizare Distanță și Status
        db.ref('sistem').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const d = data.distanta;
                distElement.innerText = d + " cm";

                if (d <= 10) {
                    distElement.className = "value danger";
                    statusElement.innerText = "PERICOL: OBIECT APROAPE!";
                    statusElement.className = "status-text danger";
                } else {
                    distElement.className = "value safe";
                    statusElement.innerText = "SISTEM OK";
                    statusElement.className = "status-text safe";
                }
            }
        });

        // Monitorizare Buton (Update la apăsare)
        db.ref('trigger_buton').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val) {
                // Generăm ora în momentul în care primim semnalul de la Arduino
                const now = new Date();
                lastTimeElement.innerText = now.toLocaleTimeString('ro-RO');
                
                // Efect vizual temporar (opțional)
                lastTimeElement.style.color = "#e74c3c";
                setTimeout(() => { lastTimeElement.style.color = "#eee"; }, 2000);
            }
        });
    </script>
</body>
</html>
