<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Dashboard - Live Cloud</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --container-bg: #112240;
            --accent-color: #64ffda;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
            --alert-color: #f44336;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }

        .container { 
            background: var(--container-bg); 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            border-top: 5px solid var(--accent-color); 
            width: 360px; 
            text-align: center;
        }

        h1 { color: var(--accent-color); font-size: 1.8rem; margin-bottom: 0.2rem; letter-spacing: 2px; }
        .subtitle { color: var(--text-dim); font-size: 0.7rem; margin-bottom: 2rem; display: block; text-transform: uppercase; letter-spacing: 1px;}

        .stat-card {
            background: rgba(2, 12, 27, 0.5);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid #233554;
            transition: 0.3s;
        }

        .label { display: block; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.8rem; }
        .value { font-family: 'Courier New', monospace; font-size: 2.8rem; font-weight: bold; color: var(--text-main); }

        .status-ok { color: var(--accent-color); }
        .status-alert { color: var(--alert-color); text-shadow: 0 0 10px var(--alert-color); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .sync-box { margin-top: 1.5rem; font-size: 0.7rem; color: var(--text-dim); border-top: 1px solid #233554; padding-top: 1rem; }
        #last-update { color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>ECHO SYSTEM</h1>
    <span class="subtitle">IoT Cloud Monitor V1.0</span>

    <div class="stat-card">
        <span class="label">Distanță Obstacol</span>
        <span id="distanta" class="value">-- cm</span>
    </div>

    <div class="stat-card">
        <span class="label">Status Perimetru</span>
        <span id="alerta" class="value status-ok">SCANARE</span>
    </div>

    <div class="sync-box">
        Ultima actualizare Cloud: <span id="last-update">Așteptare...</span>
    </div>
</div>

<script>
    // --- DATELE TALE CONFIGURATE ---
    const CHANNEL_ID = '3325389';
    const READ_API_KEY = '446NMXGKO5WC319U';

    async function fetchData() {
        const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/fields/1/last.json?api_key=${READ_API_KEY}`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data && data.field1 !== null) {
                updateInterface(parseInt(data.field1), data.created_at);
            }
        } catch (error) {
            console.error("Eroare la sincronizare:", error);
        }
    }

    function updateInterface(dist, time) {
        document.getElementById('distanta').innerText = dist + " cm";
        
        const alertaEl = document.getElementById('alerta');
        if (dist < 50 && dist > 0) {
            alertaEl.innerText = "PERICOL";
            alertaEl.className = "value status-alert";
        } else {
            alertaEl.innerText = "NOMINAL";
            alertaEl.className = "value status-ok";
        }

        const date = new Date(time);
        document.getElementById('last-update').innerText = date.toLocaleTimeString();
    }

    // ThingSpeak Free are limita de 15 secunde
    setInterval(fetchData, 15500); 
    fetchData(); 
</script>
</body>
</html>
